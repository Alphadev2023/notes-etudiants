<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-xl font-bold text-neutral-800">Gestion des comptes</h2>
      <p class="text-sm text-neutral-500">{{ users().length }} compte(s) enregistré(s)</p>
    </div>
    <button (click)="toggleForm()" class="btn-primary flex items-center gap-2">
      <app-icon [name]="showForm() ? 'x' : 'plus'" [size]="16"></app-icon>
      {{ showForm() ? 'Annuler' : 'Nouveau compte' }}
    </button>
  </div>

  <div
    *ngIf="successMsg()"
    class="p-3 bg-success-50 border border-success-200 rounded-lg flex items-center gap-2"
  >
    <app-icon name="check-circle" [size]="16" class="text-success-600"></app-icon>
    <p class="text-success-700 text-sm">{{ successMsg() }}</p>
  </div>

  <!-- Formulaire -->
  <div *ngIf="showForm()" class="card border-primary-200 bg-primary-50/30">
    <h3 class="text-base font-semibold text-neutral-800 mb-4">Nouveau compte</h3>

    <div
      *ngIf="errorMsg()"
      class="mb-3 p-3 bg-danger-50 border border-danger-200 rounded-lg flex items-center gap-2"
    >
      <app-icon name="alert-triangle" [size]="16" class="text-danger-600"></app-icon>
      <p class="text-danger-700 text-sm">{{ errorMsg() }}</p>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="label">Nom</label>
        <input type="text" [(ngModel)]="form.nom" class="input" placeholder="Dupont" />
      </div>
      <div>
        <label class="label">Prénom</label>
        <input type="text" [(ngModel)]="form.prenom" class="input" placeholder="Jean" />
      </div>
      <div>
        <label class="label">Email</label>
        <input
          type="email"
          [(ngModel)]="form.email"
          class="input"
          placeholder="jean.dupont@email.com"
        />
      </div>
      <div>
        <label class="label">Rôle</label>
        <select [(ngModel)]="form.role" class="input">
          <option *ngFor="let r of roles" [value]="r.value">{{ r.label }}</option>
        </select>
      </div>
      <div class="col-span-2">
        <label class="label">Mot de passe</label>
        <input
          type="password"
          [(ngModel)]="form.password"
          class="input"
          placeholder="Minimum 8 caractères"
        />
      </div>
    </div>

    <div class="flex justify-end mt-4">
      <button (click)="onSubmit()" [disabled]="saving()" class="btn-primary">
        <app-icon *ngIf="saving()" name="refresh" [size]="16" class="animate-spin mr-2"></app-icon>
        {{ saving() ? 'Création...' : 'Créer le compte' }}
      </button>
    </div>
  </div>

  <!-- Loader -->
  <div *ngIf="loading()" class="flex items-center justify-center py-12">
    <app-icon name="refresh" [size]="32" class="text-primary-400 animate-spin"></app-icon>
  </div>

  <!-- Table -->
  <div *ngIf="!loading()" class="table-container">
    <table class="table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Email</th>
          <th>Rôle</th>
          <th>Statut</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users()">
          <td>
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-neutral-100 rounded-full flex items-center justify-center">
                <app-icon name="user" [size]="14" class="text-neutral-500"></app-icon>
              </div>
              <div>
                <p class="font-medium text-neutral-800">{{ user.prenom }} {{ user.nom }}</p>
              </div>
            </div>
          </td>
          <td class="text-neutral-500">{{ user.email }}</td>
          <td>
            <span [class]="getRoleBadge(user.roles)">{{ getRoleLabel(user.roles) }}</span>
          </td>
          <td>
            <span [class]="user.actif ? 'badge-success' : 'badge-danger'">
              {{ user.actif ? 'Actif' : 'Inactif' }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
