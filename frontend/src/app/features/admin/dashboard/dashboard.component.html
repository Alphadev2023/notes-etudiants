<div class="space-y-6">
  <!-- Bienvenue -->
  <div class="card bg-gradient-to-r from-primary-600 to-primary-700 border-0 text-white">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
        <app-icon name="home" [size]="24" class="text-white"></app-icon>
      </div>
      <div>
        <h2 class="text-xl font-bold">Bienvenue, {{ getUserName() }}</h2>
        <p class="text-primary-200 text-sm">Tableau de bord administrateur</p>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 gap-4 lg:grid-cols-4">
    <div
      *ngFor="let stat of stats()"
      class="card cursor-pointer hover:shadow-md transition-shadow"
      [routerLink]="stat.route"
    >
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center" [class]="stat.color">
          <app-icon [name]="stat.icon" [size]="20"></app-icon>
        </div>
        <div>
          <p class="text-2xl font-bold text-neutral-800">{{ stat.value }}</p>
          <p class="text-xs text-neutral-500">{{ stat.label }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Accès rapides -->
  <div class="card">
    <h3 class="text-base font-semibold text-neutral-800 mb-4">Accès rapides</h3>
    <div class="grid grid-cols-2 gap-3">
      <a
        *ngFor="let link of quickLinks"
        [routerLink]="link.route"
        class="flex items-center gap-3 p-3 rounded-lg border border-neutral-200 hover:bg-primary-50 hover:border-primary-200 transition-all group"
      >
        <div
          class="w-8 h-8 bg-neutral-100 group-hover:bg-primary-100 rounded-lg flex items-center justify-center transition-colors"
        >
          <app-icon
            [name]="link.icon"
            [size]="16"
            class="text-neutral-600 group-hover:text-primary-600"
          ></app-icon>
        </div>
        <span class="text-sm font-medium text-neutral-700 group-hover:text-primary-700">{{
          link.label
        }}</span>
        <app-icon name="chevron-right" [size]="16" class="text-neutral-400 ml-auto"></app-icon>
      </a>
    </div>
  </div>
</div>
