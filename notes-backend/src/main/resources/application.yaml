spring:
  application:
    name: notes-backend

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/notes_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  modulith:
    republish-outstanding-events-on-restart: true

server:
  port: 8081
  servlet:
    context-path: /

application:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000        # 24h en ms
    refresh-expiration: 604800000  # 7j en ms

  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:80

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.gestion: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO